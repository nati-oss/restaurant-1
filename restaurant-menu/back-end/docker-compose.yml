services:
  app:
    build: .

    command: python app/manage.py runserver 0.0.0.0:8000


    env_file:
      - .env

    depends_on:
      - db

    ports:
      - "8000:8000"
    volumes:
      - .:/app

  db:
    image: postgres:14

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: